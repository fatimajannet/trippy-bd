{% extends 'base.html' %}
{% block title %}Booking Confirmed — TrIppyBD{% endblock %}

{% block content %}
<div class="container text-center" style="padding: 150px 0; color: white;">
    <div class="success-card" style="background: rgba(255,255,255,0.05); padding: 50px; border-radius: 20px; border: 1px solid #4ade80;">
        <div style="font-size: 4rem; margin-bottom: 20px;">✅</div>
        <h1 style="font-weight: 800; margin-bottom: 10px;">Booking Confirmed!</h1>
        <p style="color: rgba(255,255,255,0.6); font-size: 1.1rem; margin-bottom: 30px;">
            Pack your bags! Your stay at <strong>{{ room.hotel.name }}</strong> is officially booked.
        </p>
        
        <div style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px; display: inline-block; margin-bottom: 40px;">
            <p class="mb-1" style="font-size: 0.8rem; text-transform: uppercase; color: #4ade80;">Total Paid</p>
            <h2 style="margin: 0; color: white;">৳{{ total }}</h2>
        </div>

        <div>
            <a href="{% url 'hotel_list' %}" class="btn-primary-custom" style="padding: 12px 30px;">Explore More Hotels</a>
        </div>
    </div>
</div>
{% endblock %}

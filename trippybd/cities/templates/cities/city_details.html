<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ city.name }} - Details</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
        }

        section {
            padding: 20px;
            background-color: white;
            margin: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        footer {
            text-align: center;
            padding: 10px;
            background-color: #007bff;
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <h1>{{ city.name }} - City Details</h1>
    </header>

    <section>
        <h2>About {{ city.name }}</h2>
        <p><strong>Description:</strong> {{ city.description }}</p>
        <p><strong>Population:</strong> {{ city.population }}</p>
        <p><strong>Region:</strong> {{ city.region }}</p>
    </section>

    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>
</html>
